<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>쇼핑 레이더 오늘의 특가 갤러리</title>
<!--OG_META-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>:root{--bg:#070B16;--surface:#101A2E;--surface-2:#16223C;--blue:#0064FF;--blue-light:#4EA1FF;--text:#F2F6FF;--text-muted:#8CA0C6;--border:#1E2B47}*{box-sizing:border-box}html,body{margin:0;padding:0}body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;padding-bottom:60px}header{padding:48px 24px 28px;text-align:center;border-bottom:1px solid var(--border)}.eyebrow{display:inline-block;font-family:'Space Grotesk',sans-serif;font-size:12px;letter-spacing:0.14em;color:var(--blue-light);background:rgba(0,100,255,0.12);border:1px solid rgba(78,161,255,0.4);padding:5px 12px;border-radius:999px;margin-bottom:14px}h1{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:clamp(26px,5vw,42px);margin:0 0 8px;letter-spacing:-0.01em}header p{color:var(--text-muted);margin:0;font-size:13px}.grid{max-width:1100px;margin:40px auto 0;padding:0 24px;display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px}.card{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:transform .18s ease,border-color .18s ease;display:flex;flex-direction:column}.card:hover{transform:translateY(-4px);border-color:rgba(78,161,255,0.5)}.card a.photo-link{display:block;position:relative;aspect-ratio:1 / 1;background:var(--surface-2);overflow:hidden}.card img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .25s ease}.card a.photo-link:hover img{transform:scale(1.05)}.ribbon{position:absolute;top:12px;left:-34px;background:var(--blue);color:#fff;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:12px;padding:4px 40px;transform:rotate(-38deg);box-shadow:0 2px 6px rgba(0,0,0,0.35)}.card-body{padding:14px 14px 16px;display:flex;flex-direction:column;gap:10px;flex:1}.card-title{font-size:14px;font-weight:500;line-height:1.4;color:var(--text);min-height:38px}.price-row{display:flex;align-items:baseline;gap:8px}.discount-tag{color:var(--blue-light);font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:14px}.card.sold-out{opacity:0.55}.card.sold-out .card img{filter:grayscale(1)}.ribbon-soldout{background:#4B5568 !important}.soldout-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.45);color:#fff;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:18px;letter-spacing:0.05em}.go-btn-disabled{background:var(--surface-2);color:var(--text-muted);cursor:not-allowed}.photo-link{cursor:pointer}span.photo-link{cursor:default}.price{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px;color:var(--text)}.go-btn{margin-top:auto;display:inline-flex;align-items:center;justify-content:center;gap:6px;background:var(--blue);color:#fff;text-decoration:none;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:13px;padding:10px 12px;border-radius:10px;transition:filter .15s ease}.go-btn:hover{filter:brightness(1.12)}.empty{max-width:480px;margin:60px auto;text-align:center;color:var(--text-muted);padding:0 24px}.empty h2{font-family:'Space Grotesk',sans-serif;color:var(--text);font-size:20px;margin-bottom:8px}footer{text-align:center;color:var(--text-muted);font-size:11px;margin-top:50px;padding:0 24px}.toolbar{max-width:1100px;margin:26px auto 0;padding:0 24px;display:flex;justify-content:flex-end}.sort-select{background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:13px;padding:9px 14px;border-radius:10px;cursor:pointer}.sort-select:focus{outline:none;border-color:var(--blue-light)}@media (max-width:480px){header{padding:36px 16px 22px}.toolbar{justify-content:center;padding:0 16px}.grid{padding:0 16px;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px}}</style>
</head>
<body>

<header>
  <span class="eyebrow">{{OG_BADGE}}</span>
  <h1>{{OG_TITLE}}</h1>
  <p>{{OG_DESC}}</p>
</header>

<div class="toolbar">
  <select id="sortSelect" class="sort-select" onchange="onSortChange()">
    <option value="latest">최신 등록순</option>
    <option value="discount">할인율 높은순</option>
    <option value="priceLow">가격 낮은순</option>
    <option value="priceHigh">가격 높은순</option>
  </select>
</div>

<div id="grid" class="grid"></div>
<div id="emptyState" class="empty" style="display:none;">
  <h2>오늘 등록된 특가가 아직 없어요</h2>
  <p>곧 새로운 특가가 올라올 예정이에요.</p>
</div>

<footer>매일 자정 기준으로 새 특가로 갱신돼요</footer>
